name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # enables npm provenance attestations
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci

      # Guardrail: the tag version must match package.json version.
      # Mismatches mean someone pushed a tag without running `npm version`.
      - name: Verify tag matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Publishing rateship@$PKG_VERSION"

      - run: npm run lint
      - run: npm test
      - run: npm run build

      # Pre-releases (v2.0.0-rc.1, v2.0.0-alpha.2, ...) land on the `next`
      # dist-tag so `npm install rateship` keeps the last stable.
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            npm publish --access=public --tag next --provenance
          else
            npm publish --access=public --provenance
          fi
